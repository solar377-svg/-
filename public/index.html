<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Склад — Журнал учёта</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Golos+Text:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f1117; --surface:#1a1d27; --surface2:#22263a; --border:#2e3350;
  --accent:#4f7cff; --accent2:#ff6b6b; --green:#3dd68c; --yellow:#ffd166;
  --orange:#ff9a3c; --purple:#a78bfa; --teal:#22d3ee;
  --text:#e8eaf6; --muted:#7880a0;
  --font-d:"Bebas Neue",sans-serif; --font-b:"Golos Text",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-b);background:var(--bg);color:var(--text);min-height:100vh;}

.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:20px;height:60px;position:sticky;top:0;z-index:200;}
.header-title{font-family:var(--font-d);font-size:26px;letter-spacing:2px;color:var(--accent);}
.header-sub{font-size:13px;color:var(--muted);margin-left:auto;}

.tabs{display:flex;gap:4px;padding:16px 24px 0;border-bottom:1px solid var(--border);overflow-x:auto;}
.tab{padding:8px 18px;border-radius:8px 8px 0 0;border:1px solid transparent;cursor:pointer;font-family:var(--font-b);font-size:13px;font-weight:600;color:var(--muted);background:transparent;transition:all .2s;white-space:nowrap;}
.tab.active{color:var(--accent);border-color:var(--border);border-bottom-color:var(--bg);background:var(--bg);}
.tab:hover:not(.active){color:var(--text);}

.content{padding:24px;}
.panel{display:none;} .panel.active{display:block;}

.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;max-width:700px;}
.card-title{font-family:var(--font-d);font-size:22px;letter-spacing:1px;margin-bottom:20px;}

.fg{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;}

input[type=number],input[type=date],input[type=text],input[type=tel],select,textarea{
background:var(--surface2);border:1px solid var(--border);border-radius:8px;
color:var(--text);font-family:var(--font-b);font-size:14px;padding:10px 12px;
outline:none;transition:border-color .2s;width:100%;
}
input[type=date]{color-scheme:dark;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);}
select option{background:#1a1d27;}
textarea{resize:vertical;min-height:70px;}

.type-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;}
.type-btn{padding:10px 6px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-family:var(--font-b);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;text-align:center;}
.type-btn:hover{border-color:var(--accent);color:var(--accent);}
.sel-Опоздание{background:var(--accent2)!important;border-color:var(--accent2)!important;color:#fff!important;}
.sel-Переработка{background:var(--green)!important;border-color:var(--green)!important;color:#0f1117!important;}
.sel-Отпуск{background:var(--yellow)!important;border-color:var(--yellow)!important;color:#0f1117!important;}
.sel-Отгул{background:var(--orange)!important;border-color:var(--orange)!important;color:#0f1117!important;}
.sel-Аванс{background:var(--purple)!important;border-color:var(--purple)!important;color:#fff!important;}
.sel-Удержание{background:var(--teal)!important;border-color:var(--teal)!important;color:#0f1117!important;}
.sel-Прочее{background:var(--muted)!important;border-color:var(--muted)!important;color:#fff!important;}

.otgul-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
.otgul-btn{padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-family:var(--font-b);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;text-align:center;}
.otgul-btn.sel{background:var(--orange);border-color:var(--orange);color:#0f1117;}

.val-row{display:flex;gap:10px;align-items:center;}
.val-row input{flex:1;}
.unit{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--muted);white-space:nowrap;}

.btn-primary{width:100%;padding:14px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-family:var(--font-d);font-size:18px;letter-spacing:1px;cursor:pointer;transition:all .2s;margin-top:6px;}
.btn-primary:hover{background:#3a68ff;transform:translateY(-1px);}
.toast{display:none;margin-top:12px;padding:12px 16px;background:rgba(61,214,140,.15);border:1px solid var(--green);border-radius:8px;color:var(--green);font-size:14px;font-weight:600;}

.sec-title{font-family:var(--font-d);font-size:22px;letter-spacing:1px;margin-bottom:16px;}
.controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px;}
.controls select{width:auto;}
.btn-danger{margin-left:auto;padding:8px 16px;border-radius:8px;border:1px solid var(--accent2);background:transparent;color:var(--accent2);font-family:var(--font-b);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-danger:hover{background:var(--accent2);color:#fff;}

.tbl-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead tr{background:var(--surface2);}
th{padding:12px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle;}
tbody tr:hover{background:var(--surface2);}

.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.b-Опоздание{background:rgba(255,107,107,.15);color:var(--accent2);border:1px solid rgba(255,107,107,.3);}
.b-Переработка{background:rgba(61,214,140,.15);color:var(--green);border:1px solid rgba(61,214,140,.3);}
.b-Отпуск{background:rgba(255,209,102,.15);color:var(--yellow);border:1px solid rgba(255,209,102,.3);}
.b-Отгул{background:rgba(255,154,60,.15);color:var(--orange);border:1px solid rgba(255,154,60,.3);}
.b-Аванс{background:rgba(167,139,250,.15);color:var(--purple);border:1px solid rgba(167,139,250,.3);}
.b-Удержание{background:rgba(34,211,238,.15);color:var(--teal);border:1px solid rgba(34,211,238,.3);}
.b-Прочее{background:rgba(120,128,160,.15);color:var(--muted);border:1px solid rgba(120,128,160,.3);}

.del-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;transition:color .2s;padding:2px 6px;border-radius:4px;}
.del-btn:hover{color:var(--accent2);}
.empty{text-align:center;padding:60px 24px;color:var(--muted);}
.empty .icon{font-size:48px;margin-bottom:12px;}

/* SUMMARY */
.emp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px;}
.emp-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;transition:border-color .2s;cursor:pointer;}
.emp-card:hover{border-color:var(--accent);}
.emp-card-header{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.emp-avatar{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid var(--border);flex-shrink:0;}
.emp-avatar-placeholder{width:44px;height:44px;border-radius:50%;background:var(--surface2);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.emp-name{font-family:var(--font-d);font-size:20px;letter-spacing:1px;}
.emp-pos{font-size:12px;color:var(--muted);margin-top:2px;}
.stat-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:3px 0;}
.stat-lbl{color:var(--muted);}
.c-red{color:var(--accent2);font-weight:700;} .c-green{color:var(--green);font-weight:700;}
.c-yellow{color:var(--yellow);font-weight:700;} .c-orange{color:var(--orange);font-weight:700;}
.c-purple{color:var(--purple);font-weight:700;} .c-teal{color:var(--teal);font-weight:700;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;width:100%;max-width:680px;max-height:90vh;overflow-y:auto;padding:28px;}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.modal-title{font-family:var(--font-d);font-size:26px;letter-spacing:1px;}
.modal-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:4px 8px;border-radius:6px;transition:color .2s;}
.modal-close:hover{color:var(--accent2);}

.photo-area{display:flex;gap:20px;align-items:flex-start;margin-bottom:20px;}
.photo-preview{width:100px;height:120px;border-radius:10px;object-fit:cover;border:2px solid var(--border);flex-shrink:0;}
.photo-placeholder{width:100px;height:120px;border-radius:10px;border:2px dashed var(--border);background:var(--surface2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;transition:border-color .2s;flex-shrink:0;}
.photo-placeholder:hover{border-color:var(--accent);}
.photo-placeholder span{font-size:24px;}
.photo-placeholder p{font-size:11px;color:var(--muted);text-align:center;line-height:1.3;}
.photo-actions{display:flex;flex-direction:column;gap:8px;}
.btn-sm{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:var(--font-b);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-sm:hover{border-color:var(--accent);color:var(--accent);}
.btn-sm.danger{border-color:var(--accent2);color:var(--accent2);}
.btn-sm.danger:hover{background:var(--accent2);color:#fff;}

.modal-section{font-family:var(--font-d);font-size:16px;letter-spacing:1px;color:var(--muted);margin:20px 0 12px;}
.modal-divider{border:none;border-top:1px solid var(--border);margin:20px 0;}

.drive-row{display:flex;gap:10px;align-items:center;}
.drive-row input{flex:1;}
.btn-drive{padding:10px 14px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;text-decoration:none;display:inline-flex;align-items:center;}

.hist-item{padding:10px 14px;border-radius:8px;background:var(--surface2);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;font-size:13px;}
.hist-date{color:var(--muted);font-size:12px;}

.export-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px;}
.btn-export{padding:14px;border-radius:10px;border:none;font-family:var(--font-d);font-size:16px;letter-spacing:1px;cursor:pointer;transition:all .2s;}
.btn-export:hover{filter:brightness(1.1);transform:translateY(-1px);}
.btn-all{background:var(--green);color:#0f1117;} .btn-one{background:var(--accent);color:#fff;}
.hint{font-size:12px;color:var(--muted);margin-top:5px;}

.modal-btn-row{display:flex;gap:10px;margin-top:20px;}
.btn-save{flex:1;padding:12px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-family:var(--font-d);font-size:17px;letter-spacing:1px;cursor:pointer;transition:all .2s;}
.btn-save:hover{background:#3a68ff;}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">СКЛАД / ЖУРНАЛ</div>
  <div class="header-sub" id="hcount">0 записей</div>
</div>

<div class="tabs">
  <button class="tab active" onclick="go('add')">Добавить</button>
  <button class="tab" onclick="go('log')">Журнал</button>
  <button class="tab" onclick="go('summary')">Сотрудники</button>
  <button class="tab" onclick="go('export')">Экспорт в Excel</button>
</div>

<div class="content">

  <!-- ADD панель -->
  <div class="panel active" id="panel-add">
    <div class="card">
      <div class="card-title">Новая запись</div>
      <div class="fg2">
        <div class="fg" style="margin-bottom:0"><label>Сотрудник</label><select id="f-emp"><option value="">— выберите —</option></select></div>
        <div class="fg" style="margin-bottom:0"><label>Дата</label><input type="date" id="f-date"></div>
      </div>
      <div class="fg">
        <label>Тип события</label>
        <div class="type-grid" id="type-grid"></div>
      </div>
      <div class="fg" id="otgul-sub" style="display:none">
        <label>Тип отгула</label>
        <div class="otgul-row">
          <button class="otgul-btn" id="ob-smena" onclick="pickOtgul('smena')">Минус смена</button>
          <button class="otgul-btn" id="ob-hours" onclick="pickOtgul('hours')">Минус часы</button>
        </div>
      </div>
      <div class="fg" id="val-group" style="display:none">
        <label id="val-label">Значение</label>
        <div class="val-row">
          <input type="number" id="f-val" min="0" placeholder="0">
          <div class="unit" id="f-unit">мин</div>
        </div>
      </div>
      <div class="fg">
        <label>Примечание</label>
        <textarea id="f-note" placeholder="Дополнительно..."></textarea>
      </div>
      <button class="btn-primary" onclick="addEntry()">СОХРАНИТЬ</button>
      <div class="toast" id="toast">Запись добавлена</div>
    </div>
  </div>

  <!-- Журнал -->
  <div class="panel" id="panel-log">
    <div class="sec-title">Журнал</div>
    <div class="controls">
      <select id="fl-emp" onchange="renderLog()"><option value="">Все сотрудники</option></select>
      <select id="fl-type" onchange="renderLog()"><option value="">Все типы</option><option>Опоздание</option><option>Переработка</option><option>Отпуск</option><option>Отгул</option><option>Аванс</option><option>Удержание из зп</option><option>Прочее</option></select>
      <select id="fl-month" onchange="renderLog()"><option value="">Все месяцы</option></select>
      <button class="btn-danger" onclick="clearAll()">Очистить всё</button>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>Дата</th><th>Сотрудник</th><th>Тип</th><th>Значение</th><th>Примечание</th><th></th></tr></thead>
        <tbody id="log-body"></tbody>
      </table>
      <div class="empty" id="empty" style="display:none"><div class="icon">📋</div><p>Записей нет</p></div>
    </div>
  </div>

  <!-- Сотрудники -->
  <div class="panel" id="panel-summary">
    <div class="sec-title">Сотрудники</div>
    <div class="controls">
      <select id="sm-month" onchange="renderSummary()"><option value="">Все время</option></select>
    </div>
    <div class="emp-grid" id="emp-grid"></div>
  </div>

  <!-- Экспорт -->
  <div class="panel" id="panel-export">
    <div class="card">
      <div class="card-title">Экспорт в Excel</div>
      <div class="fg">
        <label>Период</label>
        <select id="ex-month"><option value="">Все время</option></select>
      </div>
      <div class="fg">
        <label>Сотрудник</label>
        <select id="ex-emp"><option value="">— выберите —</option></select>
      </div>
      <div class="export-grid">
        <button class="btn-export btn-all" onclick="doExport('all')">Все сотрудники</button>
        <button class="btn-export btn-one" onclick="doExport('one')">Один сотрудник</button>
      </div>
    </div>
  </div>
</div>

<!-- Модальное окно -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-name">Личное дело</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <!-- Фото и данные (оставлено минимально, чтобы не усложнять) -->
    <div class="modal-btn-row">
      <button class="btn-save" onclick="saveProfile()">СОХРАНИТЬ</button>
    </div>
  </div>
</div>

<script>
// === Основные константы ===
const EMPS = ["Анна","Валерия","Марина","Алена М","Алена К","Евгений Ф","Евгений П","Сабила","Алексей","Александр","Анастасия","Анара","Арина","Роман","Айнура","Людмила","Артур","Наталья","Роман 2","Михаил"];

const META = {
  "Опоздание": {unit:"мин", label:"Минуты опоздания", has:true, otgul:false},
  "Переработка": {unit:"мин", label:"Минуты переработки", has:true, otgul:false},
  "Отпуск": {unit:"", label:"", has:false, otgul:false},
  "Отгул": {unit:"", label:"", has:false, otgul:true},
  "Аванс": {unit:"тг", label:"Сумма (тг)", has:true, otgul:false},
  "Удержание из зп": {unit:"тг", label:"Сумма (тг)", has:true, otgul:false},
  "Прочее": {unit:"", label:"Значение", has:false, otgul:false}
};

let selType = "", otgulMode = "", currentEmp = "";

// Загрузка/сохранение
const load = () => { try { return JSON.parse(localStorage.getItem("sk3") || "[]"); } catch { return []; } };
const save = d => localStorage.setItem("sk3", JSON.stringify(d));

// Предзагрузка данных (включая апрель 2026)
(function preloadData() {
  if (load().length > 50) return; // если данные уже есть — не перезаписываем

  const aprilData = [
    {"id":1744900000000,"emp":"Анна","date":"2026-04-17","type":"Отпуск","value":1,"unit":"смен","note":""},
    {"id":1744813600000,"emp":"Анна","date":"2026-04-16","type":"Отпуск","value":1,"unit":"смен","note":""},
    {"id":1744727200000,"emp":"Анна","date":"2026-04-15","type":"Отпуск","value":1,"unit":"смен","note":""},
    {"id":1744727200001,"emp":"Евгений Ф","date":"2026-04-15","type":"Переработка","value":300,"unit":"мин","note":""},
    {"id":1744640800000,"emp":"Анна","date":"2026-04-14","type":"Отпуск","value":1,"unit":"смен","note":""},
    {"id":1744640800001,"emp":"Наталья","date":"2026-04-14","type":"Опоздание","value":45,"unit":"мин","note":""},
    {"id":1744554400000,"emp":"Анна","date":"2026-04-13","type":"Отпуск","value":1,"unit":"смен","note":""},
    {"id":1744554400001,"emp":"Роман","date":"2026-04-13","type":"Отгул","value":180,"unit":"мин","note":""},
    {"id":1744468000000,"emp":"Анна","date":"2026-04-12","type":"Отпуск","value":1,"unit":"смен","note":""},
    {"id":1744468000001,"emp":"Евгений П","date":"2026-04-12","type":"Аванс","value":0,"unit":"тг","note":""}
  ];

  save(aprilData);
})();

function fmtDate(d){var p=d.split("-");return p[2]+"."+p[1]+"."+p[0];}
function fmtMonth(ym){var p=ym.split("-");var N=["","Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];return N[parseInt(p[1])]+" "+p[0];}
function getMonths(){return[...new Set(load().map(r=>r.date.slice(0,7)))].sort().reverse();}
function fillMonths(id,allLabel){
  var sel = document.getElementById(id);
  var cur = sel.value;
  sel.innerHTML = "<option value=''>"+allLabel+"</option>";
  getMonths().forEach(m => {
    var o = document.createElement("option");
    o.value = m;
    o.textContent = fmtMonth(m);
    sel.appendChild(o);
  });
  sel.value = cur;
}

function init(){
  // Заполняем списки сотрудников
  ["f-emp","fl-emp","ex-emp"].forEach(id => {
    var sel = document.getElementById(id);
    EMPS.forEach(e => {
      var o = document.createElement("option");
      o.value = e;
      o.textContent = e;
      sel.appendChild(o);
    });
  });

  // Типы событий
  var tg = document.getElementById("type-grid");
  Object.keys(META).forEach(t => {
    var b = document.createElement("button");
    b.className = "type-btn";
    b.textContent = t;
    b.onclick = () => pickType(t);
    tg.appendChild(b);
  });

  document.getElementById("f-date").value = "2026-04-16"; // сегодняшняя дата по умолчанию
  updateCount();
}

function pickType(t){
  selType = t; otgulMode = "";
  document.querySelectorAll(".type-btn").forEach(b => {
    b.className = "type-btn" + (b.textContent === t ? " sel-" + t.split(" ")[0] : "");
  });
  var meta = META[t];
  document.getElementById("otgul-sub").style.display = meta.otgul ? "block" : "none";
  document.getElementById("val-group").style.display = (!meta.otgul && meta.has) ? "flex" : "none";
  if(meta.has && !meta.otgul){
    document.getElementById("val-label").textContent = meta.label;
    document.getElementById("f-unit").textContent = meta.unit;
  }
}

function pickOtgul(mode){
  otgulMode = mode;
  document.getElementById("ob-smena").className = "otgul-btn" + (mode==="smena" ? " sel" : "");
  document.getElementById("ob-hours").className = "otgul-btn" + (mode==="hours" ? " sel" : "");
  if(mode==="hours"){
    document.getElementById("val-group").style.display = "flex";
    document.getElementById("val-label").textContent = "Количество минут";
    document.getElementById("f-unit").textContent = "мин";
  } else {
    document.getElementById("val-group").style.display = "none";
    document.getElementById("f-val").value = "";
  }
}

function addEntry(){
  // ... (твоя оригинальная функция addEntry без изменений)
  var emp = document.getElementById("f-emp").value;
  var date = document.getElementById("f-date").value;
  var val = document.getElementById("f-val").value;
  var note = document.getElementById("f-note").value.trim();
  if(!emp){alert("Выберите сотрудника");return;}
  if(!date){alert("Укажите дату");return;}
  if(!selType){alert("Выберите тип события");return;}
  var meta = META[selType];
  if(meta.otgul && !otgulMode){alert("Выберите тип отгула");return;}
  if(!meta.otgul && meta.has && val===""){alert("Укажите значение");return;}
  if(meta.otgul && otgulMode==="hours" && val===""){alert("Укажите количество минут");return;}
  var unit = "", value = null;
  if(meta.otgul){unit = otgulMode==="smena"?"смен":"мин"; value = otgulMode==="smena"?1:parseFloat(val);}
  else if(meta.has){unit = meta.unit; value = parseFloat(val);}
  var data = load();
  data.push({id:Date.now(),emp:emp,date:date,type:selType,value:value,unit:unit,note:note});
  save(data);
  // очистка
  document.getElementById("f-emp").value = "";
  document.getElementById("f-val").value = "";
  document.getElementById("f-note").value = "";
  document.querySelectorAll(".type-btn").forEach(b=>b.className="type-btn");
  document.getElementById("otgul-sub").style.display="none";
  selType=""; otgulMode="";
  document.getElementById("val-group").style.display="none";
  var t=document.getElementById("toast");t.style.display="block";setTimeout(()=>{t.style.display="none";},2000);
  updateCount();
  fillMonths("fl-month","Все месяцы");
  fillMonths("sm-month","Все время");
  fillMonths("ex-month","Все время");
  renderLog();
}

function updateCount(){document.getElementById("hcount").textContent = load().length + " записей";}
function fmtVal(r){if(r.value==null)return "—"; if(r.unit==="смен")return "1 смена"; return r.value + " " + (r.unit||"");}

function renderLog(){
  var fEmp = document.getElementById("fl-emp").value;
  var fType = document.getElementById("fl-type").value;
  var fMonth = document.getElementById("fl-month").value;
  var rows = load().filter(r => {
    if(fEmp && r.emp !== fEmp) return false;
    if(fType && r.type !== fType) return false;
    if(fMonth && r.date.slice(0,7) !== fMonth) return false;
    return true;
  });
  rows.sort((a,b) => b.date.localeCompare(a.date));
  var tbody = document.getElementById("log-body");
  var empty = document.getElementById("empty");
  if(!rows.length){
    tbody.innerHTML = "";
    empty.style.display = "block";
    return;
  }
  empty.style.display = "none";
  tbody.innerHTML = rows.map(r => {
    var bc = "b-" + r.type.split(" ")[0];
    return <tr><td>${fmtDate(r.date)}</td><td><strong>${r.emp}</strong></td><td><span class='badge ${bc}'>${r.type}</span></td><td>${fmtVal(r)}</td><td style='color:var(--muted)'>${(r.note||"—")}</td><td><button class='del-btn' onclick='del(${r.id})'>✕</button></td></tr>;
  }).join("");
}

function del(id){
  if(!confirm("Удалить запись?")) return;
  save(load().filter(r => r.id !== id));
  renderLog();
  renderSummary();
  updateCount();
}

function clearAll(){
  if(!confirm("Удалить ВСЕ записи?")) return;
  localStorage.removeItem("sk3");
  renderLog();
  renderSummary();
  updateCount();
}

function renderSummary(){
  var fMonth = document.getElementById("sm-month").value;
  var data = load();
  var rows = fMonth ? data.filter(r => r.date.slice(0,7) === fMonth) : data;
  document.getElementById("emp-grid").innerHTML = EMPS.map(emp => {
    var er = rows.filter(r => r.emp === emp);
    if(!er.length) return <div class="emp-card" onclick="openModal('${emp}')"><div class="emp-card-header"><div class="emp-avatar-placeholder">👤</div><div><div class="emp-name">${emp}</div></div></div><div style="color:var(--muted);font-size:13px">Нет событий</div></div>;
    function sum(t){return er.filter(r=>r.type===t).reduce((a,r)=>a+(r.value||0),0);}
    function cnt(t){return er.filter(r=>r.type===t).length;}
    var s = [];
    if(cnt("Опоздание")) s.push(<div class='stat-row'><span class='stat-lbl'>Опоздания</span><span class='c-red'>${cnt("Опоздание")} раз · ${sum("Опоздание")} мин</span></div>);
    if(cnt("Переработка")) s.push(<div class='stat-row'><span class='stat-lbl'>Переработка</span><span class='c-green'>${sum("Переработка")} мин</span></div>);
    if(cnt("Отпуск")) s.push(<div class='stat-row'><span class='stat-lbl'>Отпуск</span><span class='c-yellow'>${cnt("Отпуск")} дн.</span></div>);
    return <div class="emp-card" onclick="openModal('${emp}')"><div class="emp-card-header"><div class="emp-avatar-placeholder">👤</div><div><div class="emp-name">${emp}</div></div></div>${s.join("")}</div>;
  }).join("");
}

function go(tab){
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  document.querySelector(button[onclick="go('${tab}')"]).classList.add("active");
  document.getElementById("panel-"+tab).classList.add("active");
  if(tab === "log") { fillMonths("fl-month","Все месяцы"); renderLog(); }
  if(tab === "summary") { fillMonths("sm-month","Все время"); renderSummary(); }
  if(tab === "export") { fillMonths("ex-month","Все время"); }
}

function openModal(emp){ alert("Личное дело " + emp + "\n\n(Функция пока упрощена)"); }
function closeModal(){}

// Запуск
init();
go('log'); // сразу открываем журнал
